name: Nightly API Rebuild

on:
  schedule:
    - cron: '0 9 * * *'  # 3am CST / 4am CDT
  workflow_dispatch:

jobs:
  rebuild:
    name: Rebuild ${{ matrix.station.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        station:
          - name: maier
            instance_id: i-04cf8f3c771ae92c8
          - name: barton
            instance_id: i-06a19a026aefd4c7d

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@b47578312673ae6fa5b5096b7a5b4b8a8a77b43 # v4
        with:
          aws-access-key-id: ${{ secrets.RADIO_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.RADIO_AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Rebuild API + bgutil on ${{ matrix.station.name }}
        env:
          INSTANCE_ID: ${{ matrix.station.instance_id }}
        run: |
          REMOTE_CMD="docker compose -f /home/ubuntu/radio/docker-compose.yml pull bgutil-provider && docker compose -f /home/ubuntu/radio/docker-compose.yml build --build-arg BUILDDATE=\$(date +%Y%m%d) api && docker compose -f /home/ubuntu/radio/docker-compose.yml up -d api bgutil-provider && docker compose -f /home/ubuntu/radio/docker-compose.yml restart nginx"

          PARAMS=$(python3 -c "import json,sys; print(json.dumps({'commands':[sys.argv[1]]}))" "$REMOTE_CMD")

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --parameters "$PARAMS" \
            --query 'Command.CommandId' --output text)

          echo "► SSM Command: $CMD_ID"

          STATUS=""
          for i in $(seq 1 72); do
            sleep 5
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
              --query 'Status' --output text 2>/dev/null || true)
            echo "[$i] $STATUS"
            [[ "$STATUS" == "Success" || "$STATUS" == "Failed" || \
               "$STATUS" == "Cancelled" || "$STATUS" == "TimedOut" ]] && break
          done

          aws ssm get-command-invocation \
            --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query '[Status, StandardOutputContent, StandardErrorContent]' \
            --output text

          [[ "$STATUS" == "Success" ]]
